spring:
  datasource:
    url: jdbc:h2:mem:freelancer_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    enabled: false

  data:
    mongodb:
      database: freelancer_test

logging:
  level:
    org.springframework.test: INFO
    org.mongodb.driver: WARN
    org.hibernate.SQL: WARN